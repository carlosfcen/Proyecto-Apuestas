<!DOCTYPE html>
<html>

<head>
    <title>BetAnalytics</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Arial;

            background-image: url("{{ url_for('static', filename='fondo.jpg') }}");

            background-size: cover;
            /* Hace que cubra toda la pantalla */
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            /* Hace que el fondo quede fijo */

            padding: 20px;
        }

        /* Caja blanca para que la tabla se vea bien */
        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: black;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
        }
    </style>

</head>

<body>

    <div class="contenedor">

        <h1>BetAnalytics - Mejores Jugadores</h1>

        <a href="/equipos">Ver Equipos</a>

        <br><br>

        <form method="POST">

            <input type="text" name="buscar" placeholder="Buscar jugador" value="{{ buscar }}">

            <button type="submit">
                Buscar
            </button>

        </form>

        <br>

        <table>

            <tr>
                <th>Jugador</th>
                <th>Equipo</th>
                <th>Goles</th>
                <th>Asistencias</th>
                <th>Partidos</th>
                <th>Prob Gol</th>
                <th>Prob Asistencia</th>
            </tr>

            {% for jugador in jugadores %}

            <tr>
                <td>{{ jugador[0] }}</td>
                <td>{{ jugador[1] }}</td>
                <td>{{ jugador[2] }}</td>
                <td>{{ jugador[3] }}</td>
                <td>{{ jugador[4] }}</td>
                <td>{{ jugador[6] }}%</td>
                <td>{{ jugador[8] }}%</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
