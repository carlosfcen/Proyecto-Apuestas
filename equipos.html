<!DOCTYPE html>
<html>

<head>
    <title>Equipos - BetAnalytics</title>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Arial;

            background-image: url("{{ url_for('static', filename='fondo.jpg') }}");

            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;

            padding: 20px;
        }

        /* Caja blanca */
        .contenedor {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
        }

        h1 {
            color: black;
        }

        a {
            text-decoration: none;
            background-color: #333;
            color: white;
            padding: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #333;
            color: white;
        }
    </style>

</head>

<body>

    <div class="contenedor">

        <a href="/">Volver a Jugadores</a>

        <h1>Equipos Recomendados</h1>


        <img src="{{ url_for('static', filename='grafica_equipos.png') }}" width="700">

        <br><br>

        <table>

            <tr>
            <tr>
                <th>Equipo</th>
                <th>Prob Ganar</th>
                <th>Prob Empatar</th>
                <th>Prob Perder</th>
            </tr>
            </tr>

            {% for equipo in equipos %}

            <tr>
                <td>{{ equipo[0] }}</td>
                <td>{{ equipo[5] }}%</td>
                <td>{{ equipo[6] }}%</td>
                <td>{{ equipo[7] }}%</td>
            </tr>

            {% endfor %}

        </table>

    </div>

</body>

</html>
